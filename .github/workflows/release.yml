name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pygltflib lz4 etcpak Pillow xxhash pyinstaller

      - name: Build executables with PyInstaller
        working-directory: tools
        run: |
          pyinstaller cg3h_builder.spec --distpath ../dist/builder --workpath ../build/builder -y
          pyinstaller gr2_to_gltf.spec --distpath ../dist/addon --workpath ../build/addon_export -y
          pyinstaller gltf_to_gr2.spec --distpath ../dist/addon --workpath ../build/addon_import -y

      - name: Create Thunderstore package
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")

          New-Item -ItemType Directory -Force -Path thunderstore/plugins/CG3HBuilder
          New-Item -ItemType Directory -Force -Path thunderstore/plugins_data/CG3HBuilder

          $manifest = Get-Content .github/thunderstore/manifest.json | ConvertFrom-Json
          $manifest.version_number = $version
          $manifest | ConvertTo-Json | Set-Content thunderstore/manifest.json

          Copy-Item dist/builder/cg3h_builder.exe thunderstore/plugins_data/CG3HBuilder/
          Copy-Item .github/thunderstore/README.md thunderstore/
          Copy-Item .github/thunderstore/main.lua thunderstore/plugins/CG3HBuilder/

          if (Test-Path .github/thunderstore/icon.png) {
            Copy-Item .github/thunderstore/icon.png thunderstore/
          } elseif (Test-Path icon.png) {
            Copy-Item icon.png thunderstore/
          }

          @"
          {"name":"CG3HBuilder","version_number":"$version","website_url":"https://github.com/Enderclem0/CG3H","description":"CG3H Runtime Builder — scans and loads CG3H mods","dependencies":["Hell2Modding-Hell2Modding-0.2.0"]}
          "@ | Set-Content thunderstore/plugins/CG3HBuilder/manifest.json

          Compress-Archive -Path thunderstore/* -DestinationPath "CG3H-Merger-$version.zip"
        shell: pwsh

      - name: Create Blender addon ZIP
        run: |
          New-Item -ItemType Directory -Force -Path blender_addon_build/cg3h
          Copy-Item blender_addon/cg3h/__init__.py blender_addon_build/cg3h/
          Copy-Item dist/addon/cg3h_exporter.exe blender_addon_build/cg3h/
          Copy-Item dist/addon/cg3h_importer.exe blender_addon_build/cg3h/
          Copy-Item dist/builder/cg3h_builder.exe blender_addon_build/cg3h/
          Copy-Item tools/cg3h_build.py blender_addon_build/cg3h/
          Copy-Item tools/pkg_texture.py blender_addon_build/cg3h/
          Compress-Archive -Path blender_addon_build/cg3h -DestinationPath CG3H-Blender-Addon.zip
        shell: pwsh

      - name: Create tools ZIP for Python users
        run: |
          Compress-Archive -Path tools/* -DestinationPath CG3H-Python-Tools.zip
        shell: pwsh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            CG3H-Python-Tools.zip
            CG3H-Merger-*.zip
            CG3H-Blender-Addon.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CG3H-Python-Tools.zip
            CG3H-Merger-*.zip
            CG3H-Blender-Addon.zip
