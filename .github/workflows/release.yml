name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pygltflib lz4 etcpak Pillow xxhash pyinstaller

      - name: Build executables with PyInstaller
        working-directory: tools
        run: |
          pyinstaller cg3h_builder.spec --distpath ../dist/builder --workpath ../build/builder -y
          pyinstaller gr2_to_gltf.spec --distpath ../dist/addon --workpath ../build/addon_export -y
          pyinstaller gltf_to_gr2.spec --distpath ../dist/addon --workpath ../build/addon_import -y

      - name: Create Thunderstore package
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $pluginFolder = "Enderclem-CG3HBuilder"

          # r2modman places ZIP contents under plugins/{Author-ModName}/
          # (inferred from the Thunderstore package name).  We therefore
          # ship the plugin files at the ZIP's plugins/ root — NOT inside
          # an inner CG3HBuilder/ subfolder, otherwise the final layout
          # ends up with an inner folder that fails H2M's hyphen check
          # in lua_manager.hpp.

          New-Item -ItemType Directory -Force -Path "thunderstore/plugins"
          New-Item -ItemType Directory -Force -Path "thunderstore/plugins_data"

          # Root Thunderstore manifest — stamp the release version in.
          $manifest = Get-Content .github/thunderstore/manifest.json | ConvertFrom-Json
          $manifest.version_number = $version
          $manifest | ConvertTo-Json | Set-Content thunderstore/manifest.json

          Copy-Item dist/builder/cg3h_builder.exe "thunderstore/plugins_data/"
          Copy-Item .github/thunderstore/README.md thunderstore/

          # Copy every Lua module that makes up the modular plugin.
          Copy-Item .github/thunderstore/main.lua      "thunderstore/plugins/"
          Copy-Item .github/thunderstore/mod_state.lua "thunderstore/plugins/"
          Copy-Item .github/thunderstore/runtime.lua   "thunderstore/plugins/"
          Copy-Item .github/thunderstore/ui.lua        "thunderstore/plugins/"

          if (Test-Path .github/thunderstore/icon.png) {
            Copy-Item .github/thunderstore/icon.png thunderstore/
          } elseif (Test-Path icon.png) {
            Copy-Item icon.png thunderstore/
          }

          # H2M plugin-level manifest (what lua_manager.hpp reads for
          # dep resolution).  Shape mirrors the Thunderstore manifest
          # but the `name` is the folder slug (`Enderclem-CG3HBuilder`),
          # not the Thunderstore short name (`CG3HBuilder`).  Dep list
          # comes verbatim from the root manifest so CI-produced ZIPs
          # can never drift from what Thunderstore ships.
          $pluginManifest = [ordered]@{
            name           = $pluginFolder
            version_number = $version
            website_url    = $manifest.website_url
            description    = $manifest.description
            dependencies   = $manifest.dependencies
          }
          $pluginManifest | ConvertTo-Json | Set-Content "thunderstore/plugins/manifest.json"

          Compress-Archive -Path thunderstore/* -DestinationPath "Enderclem-CG3HBuilder-$version.zip"
        shell: pwsh

      - name: Create Blender addon ZIP
        run: |
          # Use the same script the local dev workflow runs so CI and
          # local builds stay in sync.  --no-build skips PyInstaller (the
          # prior step already produced the exes into dist/).  BUNDLE_SOURCES
          # in the script is the single source of truth for what ends up
          # inside the addon zip.
          python tools/build_blender_addon.py --no-build
          Copy-Item dist/cg3h_blender_addon.zip CG3H-Blender-Addon.zip
        shell: pwsh

      - name: Create tools ZIP for Python users
        run: |
          Compress-Archive -Path tools/* -DestinationPath CG3H-Python-Tools.zip
        shell: pwsh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            CG3H-Python-Tools.zip
            Enderclem-CG3HBuilder-*.zip
            CG3H-Blender-Addon.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CG3H-Python-Tools.zip
            Enderclem-CG3HBuilder-*.zip
            CG3H-Blender-Addon.zip
